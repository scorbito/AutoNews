<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>새 비밀번호 설정 — 뉴스플로우 AI</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <style>
    body { font-family: "Pretendard Variable", "Pretendard", -apple-system, "Malgun Gothic", sans-serif; background: #f5f6f8;
           display: flex; min-height: 100vh; align-items: center; justify-content: center; margin: 0; }
    .box { background: #fff; padding: 36px 32px; border-radius: 12px; width: 340px;
           box-shadow: 0 4px 20px rgba(0,0,0,.08); }
    h1 { font-size: 20px; margin: 0 0 4px; }
    .sub { color: #888; font-size: 13px; margin: 0 0 20px; line-height: 1.6; }
    label { font-size: 13px; color: #666; display: block; margin: 12px 0 4px; }
    input { width: 100%; padding: 11px; border: 1px solid #ccc; border-radius: 6px;
            font-size: 14px; box-sizing: border-box; }
    button { width: 100%; margin-top: 20px; background: #3a4fd6; color: #fff; border: 0;
             padding: 12px; border-radius: 6px; font-size: 15px; cursor: pointer; }
    button[disabled] { opacity: .6; cursor: default; }
    .err { background: #fce8e6; color: #c5221f; padding: 10px 12px; border-radius: 6px;
           font-size: 13px; margin-bottom: 8px; line-height: 1.6; }
    .alt { text-align: center; font-size: 13px; color: #666; margin-top: 16px; }
    .alt a { color: #3a4fd6; text-decoration: none; }
  </style>
</head>
<body>
  <div class="box">
    <img src="/static/logo.png" alt="뉴스플로우 AI" style="height:26px; display:block; margin-bottom:14px;">
    <h1>새 비밀번호 설정</h1>
    <p class="sub">새로 사용할 비밀번호를 입력하세요.</p>
    <div id="msg" class="err" style="display:none;"></div>
    <form id="form" style="display:none;">
      <label>새 비밀번호 (6자 이상)</label>
      <input type="password" id="pw" required minlength="6" autofocus>
      <label>새 비밀번호 확인</label>
      <input type="password" id="pw2" required minlength="6">
      <button type="submit" id="btn">비밀번호 변경</button>
    </form>
    <p class="alt"><a href="/login">← 로그인으로</a></p>
  </div>

  <script>
    const SUPA = "{{ supabase_url }}";
    const ANON = "{{ anon_key }}";
    const msg = document.getElementById('msg');
    const form = document.getElementById('form');
    function showErr(t) { msg.textContent = t; msg.style.display = 'block'; }

    // 링크의 토큰은 URL 프래그먼트(#)에 담겨 온다
    const hash = new URLSearchParams(location.hash.slice(1));
    const token = hash.get('access_token');
    const err = hash.get('error_description') || hash.get('error');

    if (err) {
      showErr('링크가 만료되었거나 유효하지 않습니다. 비밀번호 찾기를 다시 시도해 주세요.');
    } else if (!token) {
      showErr('유효하지 않은 접근입니다. 이메일의 재설정 링크로 접속하세요.');
    } else {
      form.style.display = 'block';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const pw = document.getElementById('pw').value;
      const pw2 = document.getElementById('pw2').value;
      msg.style.display = 'none';
      if (pw.length < 6) return showErr('비밀번호는 6자 이상이어야 합니다.');
      if (pw !== pw2) return showErr('비밀번호가 일치하지 않습니다.');
      const btn = document.getElementById('btn');
      btn.disabled = true; btn.textContent = '변경 중…';
      try {
        const r = await fetch(`${SUPA}/auth/v1/user`, {
          method: 'PUT',
          headers: { 'apikey': ANON, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw })
        });
        if (r.ok) { location.href = '/login?reset=1'; return; }
        const j = await r.json().catch(() => ({}));
        showErr(j.msg || j.error_description || j.message || '변경에 실패했습니다. 링크가 만료됐을 수 있어요.');
      } catch (_) {
        showErr('네트워크 오류로 변경하지 못했습니다. 잠시 후 다시 시도하세요.');
      }
      btn.disabled = false; btn.textContent = '비밀번호 변경';
    });
  </script>
</body>
</html>
