<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}auto_news{% endblock %}</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <link rel="stylesheet" href="/static/app.css">
  {% block head %}{% endblock %}
</head>
<body>
  {% set p = request.url.path %}
  <div class="app">
    <aside class="sidebar">
      <a href="/" class="brand"><span class="logo">📰</span> auto_news</a>

      <nav class="nav">
        <a href="/inbox" class="nav-item {% if p.startswith('/inbox') or p.startswith('/messages') %}active{% endif %}">
          <span class="ico">📨</span> 수집함</a>
        <a href="/" class="nav-item {% if p == '/' or p.startswith('/a/') %}active{% endif %}">
          <span class="ico">📝</span> 기사</a>
        <a href="/board" class="nav-item {% if p.startswith('/board') %}active{% endif %}">
          <span class="ico">🗞</span> 발행 게시판</a>
        <a href="/settings" class="nav-item {% if p.startswith('/settings') %}active{% endif %}">
          <span class="ico">⚙</span> 내 설정</a>
        {% if request.session.get('is_admin') %}
        <div class="nav-label">운영</div>
        <a href="/admin" class="nav-item {% if p.startswith('/admin') %}active{% endif %}">
          <span class="ico">🛠</span> 관리자</a>
        {% endif %}
      </nav>

      <div class="spacer"></div>

      <div class="userbox">
        {% set em = request.session.get('email','') %}
        <div class="avatar">{{ (em[:1] or '?')|upper }}</div>
        <div class="who">
          <b title="{{ em }}">{{ em or '게스트' }}</b>
          <a href="/logout">로그아웃</a>
        </div>
      </div>
    </aside>

    <main class="content">{% block body %}{% endblock %}</main>
  </div>
</body>
</html>
